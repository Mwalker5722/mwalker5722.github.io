    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: 'Inter', system-ui, sans-serif; 
            color: #0f172a; 
        }
        
        /* Smooth Fade Transitions */
        .slide-fade {
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s ease-out;
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
        }
        
        .slide-fade.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        /* Subtle SVG Animations */
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 8px #3b82f6); opacity: 0.85; }
            50% { filter: drop-shadow(0 0 20px #2563eb); opacity: 1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes smokeUp {
            0% { opacity: 0.8; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(1.5); }
        }
        @keyframes spinSlow { 
            100% { transform: rotate(360deg); } 
        }
        @keyframes dashFlow {
            to { stroke-dashoffset: -40; }
        }
        @keyframes ripple {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .anim-glow { animation: pulseGlow 2.5s ease-in-out infinite; }
        .anim-float { animation: float 5s ease-in-out infinite; }
        .anim-smoke { animation: smokeUp 2.5s linear infinite; }
        .anim-spin { animation: spinSlow 20s linear infinite; transform-origin: center; }
        .anim-dash { animation: dashFlow 12s linear infinite; }
        .anim-ripple { animation: ripple 4s cubic-bezier(0.4, 0, 0.2, 1) infinite; transform-origin: center; }
        
        /* Typography tweaks */
        .content-area ul { padding-left: 1.5rem; }
        .content-area li { margin-bottom: 1.2rem; font-size: 1.15rem; color: #475569; list-style-type: square; line-height: 1.6; }
        .content-area li strong { color: #0f172a; font-weight: 700; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 3px; }
    </style>
</head>

                    <ul>
                        <li><strong>Dismantle the Bureaucracy:</strong> The Nuclear Regulatory Commission's labyrinthine licensing process currently suffocates innovation for 10 to 15 years. <span class="text-[0.95rem] text-blue-500 font-bold ml-1 tracking-wide">[U.S. NRC, 2023]</span> We must aggressively streamline regulations to reflect modern safety realities.</li>
                        <li><strong>Industrialize the Atom:</strong> We must direct massive federal grants toward Small Modular Reactors (SMRs). By mass producing reactors in factories, we can deploy gigawatts of power in a fraction of the time to combat historically high construction costs. <span class="text-[0.95rem] text-blue-500 font-bold ml-1 tracking-wide">[Lovering et al., 2016]</span></li>
                        <li><strong>Execute the ADVANCE Act:</strong> Congress must ruthlessly enforce the 2024 ADVANCE Act, permanently breaking the two decade stagnation in American nuclear construction.</li>
                    </ul>
                `,
                svgId: "svg-policy"
            },
            {
                title: "Conclusion",
                headline: "The Strategic Choice",
                content: `
                    <ul>
                        <li><strong>The Turning Point:</strong> The energy infrastructure we choose to build today will irrevocably dictate whether our children inherit a world of engineered scarcity, or one of boundless opportunities.</li>

                `,
                svgId: "svg-future"
            },
            {
                title: "References",
                headline: "Bibliography",
                content: `
                    <ul style="font-size: 0.95rem; margin-bottom: 0.5rem;">
                        <li>Grossi, R. M. (2021). The safety of nuclear's future. <em>Science</em>, 372(6549), 1131.</li>
                        <li>Lovering, J. R., Yip, A., & Nordhaus, T. (2016). Historical construction costs of global nuclear power reactors. <em>Energy Policy</em>.</li>

                        <li>U.S. NRC. (2023). <em>Backgrounder on nuclear power plant licensing process</em>.</li>
                    </ul>
                `,
                svgId: "svg-yawn"
            }
        ];

        const container = document.getElementById('slides-container');
        let currentSlideIndex = 0;

        function buildSlides() {
            slides.forEach((slide, index) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = `slide-fade ${index === 0 ? 'active' : ''} w-full h-full flex flex-col lg:flex-row`;
                slideDiv.id = `slide-${index}`;

                const svgElement = document.getElementById(slide.svgId);
                const svgContent = svgElement ? svgElement.innerHTML : '';
                const bgColor = svgElement ? Array.from(svgElement.classList).find(c => c.startsWith('bg-')) || 'bg-slate-50' : 'bg-slate-50';

                slideDiv.innerHTML = `
                    <div class="w-full lg:w-5/12 h-64 lg:h-full border-b lg:border-b-0 lg:border-r border-slate-100 flex items-center justify-center overflow-hidden ${bgColor}">
                        ${svgContent}
                    </div>
                    
                    <div class="w-full lg:w-7/12 h-full p-8 lg:p-20 flex flex-col justify-center bg-white relative overflow-y-auto">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full opacity-50 pointer-events-none"></div>
                        <div class="max-w-2xl relative z-10 lg:ml-12">
                            <h2 class="text-blue-600 text-sm font-bold uppercase tracking-widest mb-3">${slide.title}</h2>
                            <h1 class="text-4xl lg:text-5xl font-black text-slate-900 mb-10 leading-tight tracking-tight">${slide.headline}</h1>
                            <div class="content-area">
                                ${slide.content}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(slideDiv);
            });
        }

        function showSlide(index) {
            if (index < 0) index = 0;
            if (index >= slides.length) index = slides.length - 1;
            if (index === currentSlideIndex) return;

            document.getElementById(`slide-${currentSlideIndex}`).classList.remove('active');
            
            currentSlideIndex = index;
            document.getElementById(`slide-${currentSlideIndex}`).classList.add('active');
        }

        function nextSlide() { showSlide(currentSlideIndex + 1); }
        function prevSlide() { showSlide(currentSlideIndex - 1); }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'Space') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        buildSlides();

    </script>
